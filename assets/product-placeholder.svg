<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f5"/>
      <stop offset="1" stop-color="#eaeaea"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="1000" fill="url(#g1)"/>

  <!-- Product mock (simplified walker/mobility aid) -->
  <g transform="translate(200,250)">
    <rect x="0" y="180" width="600" height="220" rx="40" fill="#ffffff" stroke="#dddddd"/>
    <rect x="50" y="200" width="500" height="180" rx="30" fill="#6D388B" opacity="0.12"/>
    <circle cx="150" cy="400" r="60" fill="#6D388B"/>
    <circle cx="450" cy="400" r="60" fill="#6D388B"/>
    <rect x="50" y="380" width="400" height="40" rx="20" fill="#6D388B"/>
    <text x="300" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#2E2A39">Producto Principal</text>
    <text x="300" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#666666">Modelo Premium</text>
  </g>

  <!-- Price badge -->
  <rect x="620" y="280" width="280" height="90" rx="45" fill="#dd1d1d"/>
  <text x="760" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="800" fill="#ffffff">$129.99</text>
  <text x="760" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#ffeb3b">OFERTA</text>

  <!-- Benefit icons -->
  <g transform="translate(180,620)">
    <circle cx="60" cy="60" r="55" fill="#6D388B"/>
    <text x="60" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">✓</text>
    <text x="60" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#2E2A39">Fácil</text>
    <circle cx="280" cy="60" r="55" fill="#6D388B"/>
    <text x="280" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">✓</text>
    <text x="280" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#2E2A39">Seguro</text>
    <circle cx="500" cy="60" r="55" fill="#6D388B"/>
    <text x="500" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">✓</text>
    <text x="500" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#2E2A39">Respaldo</text>
  </g>
</svg>