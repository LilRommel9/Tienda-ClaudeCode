<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6D388B"/>
      <stop offset="1" stop-color="#5a2f73"/>
    </linearGradient>
  </defs>

  <!-- Badge background -->
  <rect width="600" height="300" rx="40" fill="url(#badgeGrad)"/>

  <!-- Heart icon -->
  <circle cx="150" cy="150" r="60" fill="#ffffff" opacity="0.2"/>
  <path d="M150 110c-25 0-40 20-40 45 0 25 30 45 40 75 10-30 40-50 40-75 0-25-15-45-40-45z" fill="#ffffff"/>

  <!-- Text -->
  <text x="300" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="800" fill="#ffffff">
    +10.000 familias
  </text>
  <text x="300" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#fff8e1">
    confían en nosotros
  </text>

  <!-- Stars -->
  <g transform="translate(480 50)" fill="#ffcc00">
    <path d="M0,-30 L8,-8 L30,-8 L12,5 L19,27 M60,-30 L68,-8 L90,-8 L72,5 L79,27 M120,-30 L128,-8 L150,-8 L132,5 L139,27" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>